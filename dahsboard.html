<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<style>
body { background:#f3f4f6; font-family:Arial; }
.container { width:400px; margin:auto; background:white; padding:20px; }
</style>
</head>

<body>
<div class="container">
<h2>Admin Dashboard</h2>

<p>Total Tickets: <span id="total"></span></p>
<p>Open Tickets: <span id="open"></span></p>
</div>

<script>
fetch('http://127.0.0.1:5000/api/dashboard')
.then(res=>res.json())
.then(data=>{
total.innerText=data.total_tickets;
open.innerText=data.open_tickets;
});
</script>
</body>
</html>
