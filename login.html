<!DOCTYPE html>
<html>
<head>
<title>Museum Helpdesk Login</title>
<style>
body { background:#f3f4f6; font-family:Arial; }
.container { width:300px; margin:100px auto; background:white; padding:20px; border-radius:8px; }
button { background:#1e3a8a; color:white; padding:10px; width:100%; border:none; }
</style>
</head>

<body>
<div class="container">
<h2>Login</h2>

<input id="username" placeholder="Username"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>
<p><a href="register.html">Register</a></p>
</div>

<script>
function login(){
fetch('http://127.0.0.1:5000/api/login',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
username:username.value,
password:password.value
})
})
.then(res=>res.json())
.then(data=>{
alert(data.message);
if(data.user_id){
localStorage.setItem("user_id", data.user_id);
window.location="tickets.html";
}
});
}
</script>
</body>
</html>
