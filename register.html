<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<style>
body { background:#f3f4f6; font-family:Arial; }
.container { width:300px; margin:100px auto; background:white; padding:20px; }
button { background:#1e3a8a; color:white; padding:10px; width:100%; }
</style>
</head>

<body>
<div class="container">
<h2>Register</h2>

<input id="username"><br><br>
<input id="password" type="password"><br><br>

<button onclick="register()">Register</button>
</div>

<script>
function register(){
fetch('http://127.0.0.1:5000/api/register',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
username:username.value,
password:password.value
})
})
.then(res=>res.json())
.then(data=>alert(data.message));
}
</script>
</body>
</html>
